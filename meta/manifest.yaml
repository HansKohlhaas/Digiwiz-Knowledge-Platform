version: "1.0.0"
name: digiwiz-knowledge-platform
description: >
  Verbindliche Quelle für Regeln und Schnittstellen (Contracts):
  Playbooks, JSON-Schemas, Prompt-Schemas, API-Verträge, Runtime-Konfiguration, ADRs.
digiwiz_app_compat: ">=2026.07"
stages:
  A: knowledge_layer
  B: qualitaetssicherung
  C: cli_api
  D: ai_runtime
  E: knowledge_graph
  F: autonome_agenten
contracts:
  playbooks:
    path: playbooks/
    content: content/playbooks/
    status: active
  json_schemas:
    path: schemas/
    status: active
  prompt_schemas:
    path: schemas/prompts/
    status: planned
  api:
    path: contracts/api/
    status: planned
  runtime:
    path: runtime/
    status: active
  adrs:
    path: adr/
    status: active
  knowledge_graph:
    schema: schemas/graph/
    queries: contracts/graph/
    examples: examples/graph/
    status: planned
  retrieval:
    policy: contracts/retrieval/
    status: planned
    hinweis: Chroma/RAG-Index lebt in App — nicht SSOT (ADR-0009)
  examples:
    path: examples/
    status: active
paths:
  playbooks: playbooks/
  schemas: schemas/
  runtime: runtime/
  examples: examples/
  adrs: adr/
  content: content/
  contracts: contracts/
