version: "1.5.1"
name: digiwiz-knowledge-platform
description: >
  Verbindliche Quelle für Regeln und Schnittstellen (Contracts):
  Playbooks, JSON-Schemas, Prompt-Schemas, API-Verträge, Runtime-Konfiguration, ADRs.
digiwiz_app_compat: ">=2026.07"
status_model:
  contract_active: Schema/Policy in KP vorhanden und getestet
  app_planned: Digiwiz App-Implementierung offen
  app_active: Contract wird in der App produktiv genutzt
stages:
  A: knowledge_layer
  B: qualitaetssicherung
  C: cli_api
  D: ai_runtime
  E: knowledge_graph
  F: autonome_agenten
contracts:
  playbooks:
    path: playbooks/
    content: content/playbooks/
    contract_status: contract_active
    app_status: app_active
  json_schemas:
    path: schemas/
    contract_status: contract_active
    app_status: app_active
    includes:
      - agent-lieferung.v3.json
      - runtime_output.schema.json
      - context_builder_input.schema.json
      - context_builder_output.schema.json
      - knowledge_graph_node.schema.json
      - knowledge_graph_edge.schema.json
      - chroma_index_manifest.schema.json
      - chroma_rebuild_report.schema.json
      - playbook.schema.json
      - linkedin.schema.json
      - api_error.schema.json
  prompt_schemas:
    path: schemas/prompts/
    contract_status: app_planned
    app_status: app_planned
  api:
    path: contracts/api/
    contract_status: app_planned
    app_status: app_planned
  runtime:
    path: runtime/
    contract_status: contract_active
    app_status: app_active
  adrs:
    path: adr/
    contract_status: contract_active
    app_status: app_active
  knowledge_graph:
    schema: schemas/knowledge_graph_node.schema.json
    queries: contracts/graph/
    examples: examples/graph/
    contract_status: contract_active
    app_status: app_planned
    hinweis: Query-Contract aktiv; persistenter Graph-Store in App geplant (Stufe E)
    includes:
      - graph_query.schema.json
  retrieval:
    policy: contracts/retrieval/
    contract_status: contract_active
    app_status: app_planned
    hinweis: Merge-Policy v1 aktiv; Chroma/RAG-Index lebt in App — nicht SSOT (ADR-0009)
    includes:
      - merge_policy.yaml
  source_resolution:
    policy: contracts/source-resolution/
    examples: examples/source-resolution/
    contract_status: contract_active
    app_status: app_planned
    adr: ADR-0013
    hinweis: SQL-first vor Graph/RAG; Router in App geplant (D4)
    includes:
      - source_resolution_policy.yaml
      - context_assembly.schema.json
  context_assembly:
    schema: contracts/source-resolution/context_assembly.schema.json
    example: examples/source-resolution/context_assembly.example.json
    contract_status: contract_active
    app_status: app_planned
    adr: ADR-0011
    hinweis: Pipeline-Contract aktiv; context_assembly_pipeline in App geplant (D5)
  decision_engine:
    policy: contracts/decision-engine/
    examples: examples/decision-engine/
    contract_status: contract_active
    app_status: app_planned
    adr: ADR-0014
    hinweis: Orchestrierungsentscheidungen; keine Antworten, kein Retrieval
    includes:
      - decision_policy.yaml
      - decision_shared.schema.json
      - decision_input.schema.json
      - decision_output.schema.json
      - decision_trace.schema.json
      - decision_context.schema.json
  examples:
    path: examples/
    contract_status: contract_active
    app_status: app_active
paths:
  playbooks: playbooks/
  schemas: schemas/
  runtime: runtime/
  examples: examples/
  adrs: adr/
  content: content/
  contracts: contracts/
