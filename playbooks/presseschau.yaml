id: presseschau
version: 0.1.0
name: Presseschau
purpose: Strukturierte Zusammenfassung relevanter Quellen fuer redaktionelle Bewertung.
owner: Hans
approval_required: true
auto_publish: false
inputs:
  - topic
  - sources
  - date_range
steps:
  - collect_sources
  - summarize_findings
  - extract_claims
  - mark_risks
  - prepare_delivery
quality_checks:
  - source_urls_present
  - claims_traceable
  - no_unverified_facts_as_certainty
outputs:
  - presseschau_delivery
