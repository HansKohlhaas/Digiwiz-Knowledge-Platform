name: wordpress
title: WordPress / Blog (Vorbereitung)
version: "2026-07-09"
description: >
  Vorbereitung für Blog-Inhalte — keine Auto-Veröffentlichung.
status: vorbereitet
rules:
  - id: no_auto_publish
    severity: hard
    text: Keine direkte WordPress-Veröffentlichung aus Digiwiz
  - id: review_first
    severity: hard
    text: Freigabe über Regisseur-Inbox oder manuellen Export
  - id: brandvoice
    severity: soft
    text: DigiBest-Unternehmensstimme für Blog-Texte
workflow:
  - Entwurf in docs/content/
  - Manuelle Freigabe
  - Spätere API-Anbindung geplant
notes: >
  MCP- und REST-Erweiterung für WordPress ist für eine spätere Stufe vorgesehen.
