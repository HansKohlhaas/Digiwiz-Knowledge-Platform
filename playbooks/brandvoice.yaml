name: brandvoice
title: Brandvoice-Ampel (DigiBest / Hans)
version: "2026-07-09"
governance:
  owner: digiwiz-architecture
  approval_required: true
  auto_publish: false
  version: "2026-07-09"
  outputs:
    - brandvoice_status_meta
  quality_checks:
    - ampel_gruen_gelb_rot
    - floskeln_superlative
description: >
  Regelbasierte Prüfung für LinkedIn-Texte — Ampel grün/gelb/rot vor Freigabe.
ampel:
  gruen: freigabefähig
  gelb: manuell prüfen
  rot: nicht freigabefähig (Freigabe blockiert)
criteria:
  - keine Floskeln (z. B. "in der heutigen Zeit", "ganzheitlich")
  - keine übertriebenen Superlative ohne Beleg
  - kurze, klare Sätze
  - sachlich und entscheidungsorientiert
  - Hans-Stil / DigiBest-Tonalität
meta_fields:
  - brandvoice_status
  - brandvoice_hinweise
  - brandvoice_verstoesse
implementation: digiwiki/brandvoice_pruefung.py
