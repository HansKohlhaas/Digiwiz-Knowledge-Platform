name: linkedin
title: LinkedIn-Beiträge (Hans-Stil)
version: "2026-07-09"
governance:
  owner: digiwiz-architecture
  approval_required: true
  auto_publish: false
  version: "2026-07-09"
  outputs:
    - linkedin_post_draft
  quality_checks:
    - brandvoice
    - no_pitch
    - length_hashtags
description: >
  Thought-Leadership-Posts für LinkedIn — sachlich, entscheidungsorientiert, ohne Verkaufspitch.
content_file: content/playbooks/linkedin-presseschau.md
stimme: hans
structure:
  - hook
  - kontext
  - einordnung
  - dialog_frage
rules:
  - id: sie_form
    severity: soft
    text: Respektvolles Sie in Beiträgen
  - id: no_pitch
    severity: hard
    text: Kein direkter DigiBest-Verkaufspitch im Post
  - id: one_hans_phrase
    severity: soft
    text: Maximal eine typische Hans-Phrase pro Text
no_gos:
  - "Alles klar"
  - "Alles paletti"
  - "Machen wir"
  - "Man muss einfach"
  - "Sie sollten unbedingt"
