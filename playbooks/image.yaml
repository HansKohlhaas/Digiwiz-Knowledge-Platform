name: image
title: Beitragsbild (Presseschau)
version: "2026-07-09"
description: >
  Optionales Bild für LinkedIn-Posts — Prompt oder Datei, keine Auto-Veröffentlichung.
rules:
  - id: no_text_in_image
    severity: hard
    text: Kein Text im Bild
  - id: format
    severity: soft
    text: "LinkedIn landscape ca. 1536×1024"
  - id: style
    severity: soft
    text: Professionell, Business, Pharma/Apotheke — keine Stock-Klischees
fields:
  - bild_prompt
  - bild_datei
  - bild_base64
storage: data/presseschau/assets/
generation: OpenAI (manuell in Regisseur-Inbox — OPENAI_API_KEY erforderlich)
